 <div style="border-top: 2px solid #000; padding: 10px;">
      <h3>🛒 Shopping PokeCart</h3>
      @for (item of menuService.cart(); track $index) {
        <div>{{ item.Name }} - ₱{{ item.Price }}</div>
      } @empty {
        <p>Cart is empty.</p>
      }
      <hr>
      <h4>Total: ₱{{ menuService.totalPrice() }}</h4>
      <button (click)="menuService.clearCart()">Checkout / Clear</button>
    
    </div>
